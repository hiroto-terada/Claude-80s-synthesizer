<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FM-80 VJ Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Scale canvas to fill screen while keeping 160:144 pixel-art ratio */
    #vj-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      width:  min(100vw, calc(100vh * 160 / 144));
      height: min(100vh, calc(100vw * 144 / 160));
      display: block;
    }

    /* HUD overlay (bottom-right) */
    #hud {
      position: fixed;
      bottom: 14px;
      right: 14px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      font-family: 'Courier New', monospace;
    }

    .style-btns {
      display: flex;
      gap: 5px;
    }

    .style-btn {
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 3px 8px;
      background: rgba(15, 56, 15, 0.75);
      border: 1px solid #306230;
      color: #306230;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .style-btn:hover,
    .style-btn.active {
      color: #9bbc0f;
      border-color: #8bac0f;
      background: rgba(15, 56, 15, 0.9);
    }

    #status {
      font-size: 9px;
      letter-spacing: 2px;
      color: #306230;
      background: rgba(15, 56, 15, 0.75);
      padding: 3px 8px;
      border: 1px solid #306230;
      border-radius: 2px;
      transition: color 0.4s, border-color 0.4s;
    }
    #status.connected {
      color: #9bbc0f;
      border-color: #8bac0f;
    }

    /* Hide HUD after 4s of no mouse movement */
    #hud { transition: opacity 0.6s; }
    #hud.hidden { opacity: 0; pointer-events: none; }

    #audio-btn, #auto-cycle-btn {
      font-family: inherit;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 3px 8px;
      background: rgba(15, 56, 15, 0.75);
      border: 1px solid #306230;
      color: #306230;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #audio-btn:hover, #auto-cycle-btn:hover { color: #9bbc0f; border-color: #8bac0f; }
    #audio-btn.on { color: #9bbc0f; border-color: #8bac0f; background: rgba(15, 56, 15, 0.9); }
    #auto-cycle-btn.on { color: #9bbc0f; border-color: #8bac0f; background: rgba(15, 56, 15, 0.9); }
  </style>
</head>
<body>

<canvas id="vj-canvas"></canvas>

<div id="hud">
  <div class="style-btns">
    <button class="style-btn active" data-style="digital">DIGITAL</button>
    <button class="style-btn"        data-style="soft">SOFT</button>
    <button class="style-btn"        data-style="art">ART</button>
    <button class="style-btn"        data-style="matrix">MATRIX</button>
    <button class="style-btn"        data-style="scope">SCOPE</button>
  </div>
  <div style="display:flex;gap:5px">
    <button id="auto-cycle-btn">AUTO SCENE: OFF</button>
    <button id="audio-btn">♪ ENABLE AUDIO</button>
  </div>
  <div id="status">CONNECTING...</div>
</div>

<script src="synth.js"></script>
<script src="drum.js"></script>
<script src="vj.js?v=4"></script>
<script>
  const canvas        = document.getElementById('vj-canvas');
  const statusEl      = document.getElementById('status');
  const hud           = document.getElementById('hud');
  const btns          = document.querySelectorAll('.style-btn');
  const audioBtn      = document.getElementById('audio-btn');
  const autoCycleBtn  = document.getElementById('auto-cycle-btn');

  // ── Chord utils (mirror of chord.js, no UI dependencies) ─
  const PC_CHORD_TYPES = [
    { id: 'maj',  intervals: [0, 4, 7] },
    { id: 'min',  intervals: [0, 3, 7] },
    { id: '7',    intervals: [0, 4, 7, 10] },
    { id: 'm7',   intervals: [0, 3, 7, 10] },
    { id: 'maj7', intervals: [0, 4, 7, 11] },
    { id: 'dim',  intervals: [0, 3, 6] },
    { id: 'sus4', intervals: [0, 5, 7] },
  ];
  function chordMidisPC(root, typeId) {
    const type = PC_CHORD_TYPES.find(t => t.id === typeId);
    return (type ? type.intervals : [0, 4, 7]).map(i => root + i);
  }

  // ── PC Sequencer ─────────────────────────────────────────
  // Runs the full pattern locally on the PC's Web Audio clock.
  // Uses 100ms lookahead so notes are sample-accurately scheduled.
  class PCSequencer {
    constructor(audioCtx, drums, bass1, bass2, chordSynth) {
      this.ctx        = audioCtx;
      this.drums      = drums;
      this.bass1      = bass1;
      this.bass2      = bass2;
      this.chordSynth = chordSynth;
      this.playing    = false;
      this.step       = 0;
      this.nextStepTime    = 0;
      this.stepSec         = 0.2;
      this._prevChordMidis = [];
      this._timerId        = null;
      this.seq1Steps  = [];
      this.seq2Steps  = [];
      this.drumSteps  = null;
      this.drumEnabled = false;
      this.chordSteps = [];
      // Pending patterns — applied at next step 0 (same as iPhone _pendingPattern)
      this._pendingSeq1  = null;
      this._pendingSeq2  = null;
      this._pendingChord = null;
    }

    start(data) {
      this.stop();
      this.stepSec     = (60 / data.bpm) / 4;
      this.seq1Steps   = data.seq1  || [];
      this.seq2Steps   = data.seq2  || [];
      this.drumSteps   = data.drums || null;
      this.drumEnabled = data.drumEnabled || false;
      this.chordSteps  = data.chord || [];
      this.step        = 0;
      this.nextStepTime = this.ctx.currentTime + 0.05;
      this.playing = true;
      this._schedule();
    }

    stop() {
      this.playing = false;
      if (this._timerId) { clearTimeout(this._timerId); this._timerId = null; }
      this._prevChordMidis.forEach(m => this.chordSynth.noteOff(m));
      this._prevChordMidis = [];
      this._pendingSeq1 = null;
      this._pendingSeq2 = null;
      this._pendingChord = null;
    }

    updateBpm(bpm) { this.stepSec = (60 / bpm) / 4; }

    _schedule() {
      const LOOKAHEAD = 0.1; // seconds
      while (this.nextStepTime < this.ctx.currentTime + LOOKAHEAD) {
        this._scheduleStep(this.step, this.nextStepTime);
        this.step = (this.step + 1) % 16;
        this.nextStepTime += this.stepSec;
      }
      if (this.playing) {
        this._timerId = setTimeout(() => this._schedule(), 25);
      }
    }

    _scheduleStep(s, when) {
      // Apply queued pattern updates at loop start — mirrors iPhone _pendingPattern behaviour
      if (s === 0) {
        if (this._pendingSeq1)  { this.seq1Steps  = this._pendingSeq1;  this._pendingSeq1  = null; }
        if (this._pendingSeq2)  { this.seq2Steps  = this._pendingSeq2;  this._pendingSeq2  = null; }
        if (this._pendingChord) { this.chordSteps = this._pendingChord; this._pendingChord = null; }
      }

      // Drums
      if (this.drumEnabled && this.drumSteps) {
        const ds = this.drumSteps;
        if (ds.kick[s])    this.drums.playAt('kick',    when);
        if (ds.snare[s])   this.drums.playAt('snare',   when);
        if (ds.hihat[s])   this.drums.playAt('hihat',   when);
        if (ds.openhat[s]) this.drums.playAt('openhat', when);
        if (ds.clap[s])    this.drums.playAt('clap',    when);
        if (ds.cowbell[s]) this.drums.playAt('cowbell', when);
      }

      // SEQ1 bass
      const step1 = this.seq1Steps[s];
      if (step1 && step1.active) {
        this.bass1.noteOnAt(step1.midi, when, this.stepSec * 0.8);
      }

      // SEQ2 bass
      const step2 = this.seq2Steps[s];
      if (step2 && step2.active) {
        this.bass2.noteOnAt(step2.midi, when, this.stepSec * 0.8);
      }

      // Chord — only retrigger when chord actually changes
      const cstep = this.chordSteps[s];
      if (cstep) {
        if (cstep.active && cstep.chord) {
          const newMidis = chordMidisPC(cstep.chord.root, cstep.chord.type);
          const toOff = this._prevChordMidis.filter(m => !newMidis.includes(m));
          const toOn  = newMidis.filter(m => !this._prevChordMidis.includes(m));
          if (toOff.length || toOn.length) {
            toOff.forEach(m => this.chordSynth.noteOffAt(m, when));
            toOn.forEach(m  => this.chordSynth.noteOnAt(m, 0.8, when));
            this._prevChordMidis = [...newMidis];
          }
        } else if (!cstep.active && this._prevChordMidis.length) {
          this._prevChordMidis.forEach(m => this.chordSynth.noteOffAt(m, when));
          this._prevChordMidis = [];
        }
      }
    }
  }

  // ── PC Audio Engine ──────────────────────────────────────
  let pcAudioCtx    = null;
  let pcDrums       = null;
  let pcMelody      = null;
  let pcChordSynth  = null;
  let pcBass1       = null;
  let pcBass2       = null;
  let pcChordMidis  = [];
  let pcAudioReady  = false;
  let pcSequencer   = null;
  let pcSeqActive   = false;
  let pendingPlayData = null;

  function enablePCAudio() {
    if (pcAudioReady) return;
    pcAudioCtx   = new (window.AudioContext || window.webkitAudioContext)();
    pcDrums      = new DrumSynth(pcAudioCtx);
    pcMelody     = new FMSynth(pcAudioCtx);
    pcChordSynth = new FMSynth(pcAudioCtx);
    pcChordSynth.setPatch('STRINGS');
    pcBass1      = new TB303Synth(pcAudioCtx);
    pcBass2      = new TB303Synth(pcAudioCtx);
    pcDrums.setSidechain([pcBass1.masterGain, pcBass2.masterGain]);
    pcSequencer  = new PCSequencer(pcAudioCtx, pcDrums, pcBass1, pcBass2, pcChordSynth);
    pcAudioReady = true;
    audioBtn.textContent = '♪ AUDIO ON';
    audioBtn.classList.add('on');
    // Start sequencer if a play event arrived before audio was enabled
    if (pendingPlayData) {
      pcSequencer.start(pendingPlayData);
      pcSeqActive = true;
      applyFxState(pendingPlayData.fxState);
      pendingPlayData = null;
    }
  }

  audioBtn.addEventListener('click', enablePCAudio);

  function applyCtrl(tgt, param, val) {
    const map = { melody: pcMelody, bass1: pcBass1, bass2: pcBass2, chord: pcChordSynth, drums: pcDrums };
    const s = map[tgt];
    if (!s) return;
    switch (param) {
      case 'volume':    s.setMasterVolume(val); break;
      case 'filter':    if (s.setFilterFreq)    s.setFilterFreq(val);    break;
      case 'reverb':    if (s.setReverbMix)     s.setReverbMix(val);     break;
      case 'dist':      if (s.setDistortion)    s.setDistortion(val);    break;
      case 'comp':      if (s.setCompressor)    s.setCompressor(val);    break;
      case 'delayTime': if (s.setDelayTime)     s.setDelayTime(val);     break;
      case 'delayFb':   if (s.setDelayFeedback) s.setDelayFeedback(val); break;
      default:          if (s.setParam)         s.setParam(param, val);  break;
    }
  }

  function applyFxState(fx) {
    if (!fx) return;
    if (fx.melody && pcMelody) {
      const m = fx.melody;
      if (m.patch) Object.keys(m.patch).forEach(k => pcMelody.setParam(k, m.patch[k]));
      if (m.filter    !== undefined) pcMelody.setFilterFreq(m.filter);
      if (m.reverb    !== undefined) pcMelody.setReverbMix(m.reverb);
      if (m.delayTime !== undefined) pcMelody.setDelayTime(m.delayTime);
      if (m.delayFb   !== undefined) pcMelody.setDelayFeedback(m.delayFb);
      if (m.volume    !== undefined) pcMelody.setMasterVolume(m.volume);
    }
    if (fx.bass1 && pcBass1) {
      const b = fx.bass1;
      if (b.volume    !== undefined) pcBass1.setMasterVolume(b.volume);
      if (b.delayTime !== undefined) pcBass1.setDelayTime(b.delayTime);
      if (b.delayFb   !== undefined) pcBass1.setDelayFeedback(b.delayFb);
      if (b.reverb    !== undefined) pcBass1.setReverbMix(b.reverb);
    }
    if (fx.bass2 && pcBass2 && fx.bass2.volume !== undefined) pcBass2.setMasterVolume(fx.bass2.volume);
    if (fx.chord && pcChordSynth && fx.chord.volume !== undefined) pcChordSynth.setMasterVolume(fx.chord.volume);
    if (fx.drums && pcDrums && fx.drums.volume !== undefined) pcDrums.setMasterVolume(fx.drums.volume);
  }

  function handleAudioEvent(ev) {
    switch (ev.t) {
      // ── PC Sequencer control (always handled) ───────────
      case 'pc_play':
        if (!pcAudioReady) { pendingPlayData = ev; return; }
        pcSequencer.start(ev);
        pcSeqActive = true;
        applyFxState(ev.fxState);
        return;
      case 'pc_stop':
        if (pcAudioReady) pcSequencer.stop();
        pcSeqActive = false;
        pendingPlayData = null;
        return;
      case 'pc_bpm':
        if (pcAudioReady && pcSeqActive) pcSequencer.updateBpm(ev.bpm);
        return;
      // ── Live pattern updates during playback ────────────
      case 'pc_seq_update':
        if (pcAudioReady && pcSeqActive) {
          // Queue for next step-0 boundary — same timing as iPhone's pending pattern
          if (ev.seq === 'seq2') pcSequencer._pendingSeq2  = ev.steps;
          else                   pcSequencer._pendingSeq1  = ev.steps;
        }
        // Cycle VJ scene on every pattern bank switch
        cycleScene();
        return;
      case 'pc_chord_update':
        if (pcAudioReady && pcSeqActive) pcSequencer._pendingChord = ev.steps;
        return;
      case 'pc_drum_update':
        if (pcAudioReady && pcSeqActive) pcSequencer.drumSteps = ev.drums;
        return;
      case 'pc_drum_enable':
        if (pcAudioReady && pcSeqActive) pcSequencer.drumEnabled = ev.enabled;
        return;
      // ── Live/control events (always pass through) ───────
      case 'note':
        if (!pcAudioReady) return;
        pcMelody.noteOn(ev.m);
        return;
      case 'noteoff':
        if (!pcAudioReady) return;
        pcMelody.noteOff(ev.m);
        return;
      case 'preset':
        if (pcAudioReady && pcMelody) pcMelody.setPatch(ev.name);
        return;
      case 'ctrl':
        if (!pcAudioReady) return;
        applyCtrl(ev.tgt, ev.param, ev.val);
        return;
    }

    // ── Legacy per-event audio (only when PC sequencer is NOT active) ──
    if (!pcAudioReady || pcSeqActive) return;
    switch (ev.t) {
      case 'kick':  pcDrums.playKick();  break;
      case 'snare': pcDrums.playSnare(); break;
      case 'drum':
        if (ev.d === 'hihat')   pcDrums.playHihat();
        if (ev.d === 'openhat') pcDrums.playOpenHihat();
        if (ev.d === 'clap')    pcDrums.playClap();
        if (ev.d === 'cowbell') pcDrums.playCowbell();
        break;
      case 'bass': {
        const b = ev.seq === 'seq2' ? pcBass2 : pcBass1;
        b.allNotesOff();
        b.noteOn(ev.midi);
        setTimeout(() => b.noteOff(ev.midi), ev.dur || 200);
        break;
      }
      case 'chord':
        pcChordMidis.forEach(m => pcChordSynth.noteOff(m));
        pcChordMidis = ev.notes || [];
        pcChordMidis.forEach(m => pcChordSynth.noteOn(m));
        break;
    }
  }

  // ── VJ display instance ─────────────────────────────────
  const display = new VJDisplay(canvas);

  // ── Scene auto-cycling on pattern bank switch ────────────
  const SCENES = ['digital', 'soft', 'art', 'matrix', 'scope'];
  let sceneIndex    = 0;
  let autoSceneCycle = false;   // default: OFF
  let _lastCycleMs  = 0;        // debounce: seq1+seq2 both fire pc_seq_update

  autoCycleBtn.addEventListener('click', () => {
    autoSceneCycle = !autoSceneCycle;
    autoCycleBtn.textContent = `AUTO SCENE: ${autoSceneCycle ? 'ON' : 'OFF'}`;
    autoCycleBtn.classList.toggle('on', autoSceneCycle);
  });

  function cycleScene() {
    if (!autoSceneCycle) return;
    const now = Date.now();
    if (now - _lastCycleMs < 500) return;  // debounce: ignore duplicate events
    _lastCycleMs = now;
    sceneIndex = (sceneIndex + 1) % SCENES.length;
    setStyle(SCENES[sceneIndex]);
  }

  // Apply ?style= URL param
  const sp = new URLSearchParams(location.search).get('style');
  if (sp) {
    display.setStyle(sp);
    btns.forEach(b => b.classList.toggle('active', b.dataset.style === sp));
  }

  display.start();

  // ── Style buttons ───────────────────────────────────────
  btns.forEach(btn => {
    btn.addEventListener('click', () => {
      setStyle(btn.dataset.style);
      sceneIndex = SCENES.indexOf(btn.dataset.style);
    });
  });

  function setStyle(s) {
    display.setStyle(s);
    btns.forEach(b => b.classList.toggle('active', b.dataset.style === s));
  }

  // Keyboard shortcuts: 1=DIGITAL 2=SOFT 3=ART 4=MATRIX 5=SCOPE
  document.addEventListener('keydown', e => {
    const map = { '1': 'digital', '2': 'soft', '3': 'art', '4': 'matrix', '5': 'scope' };
    if (map[e.key]) { setStyle(map[e.key]); sceneIndex = SCENES.indexOf(map[e.key]); }
    // F = fullscreen toggle
    if (e.key === 'f' || e.key === 'F') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    }
  });

  // Auto-hide HUD
  let hudTimer;
  function showHud() {
    hud.classList.remove('hidden');
    clearTimeout(hudTimer);
    hudTimer = setTimeout(() => hud.classList.add('hidden'), 4000);
  }
  document.addEventListener('mousemove', showHud);
  document.addEventListener('touchstart', showHud);
  showHud();

  // ── WebSocket connection ────────────────────────────────
  let ws;

  function connectWS() {
    ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => {
      statusEl.textContent = 'CONNECTED';
      statusEl.classList.add('connected');
    };

    ws.onclose = () => {
      statusEl.textContent = 'RECONNECTING...';
      statusEl.classList.remove('connected');
      setTimeout(connectWS, 2000);
    };

    ws.onerror = () => {};

    ws.onmessage = e => {
      try {
        const ev = JSON.parse(e.data);
        switch (ev.t) {
          case 'step':  display.onStep(ev.s);    break;
          case 'kick':  display.onKick();         break;
          case 'snare': display.onSnare();        break;
          case 'note':  display.onNote(ev.m);     break;
          case 'style': setStyle(ev.s);           break;
        }
        handleAudioEvent(ev);
      } catch (_) {}
    };
  }

  connectWS();
</script>
</body>
</html>
