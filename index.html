<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FM-80 Synthesizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <div class="brand">
        <span class="brand-logo">◈</span>
        <span class="brand-name">FM<span class="brand-dash">-</span>80</span>
        <span class="brand-sub">DIGITAL SYNTHESIZER</span>
      </div>
      <div class="header-right">
        <!-- Presets inline in header -->
        <div class="preset-grid">
          <button class="preset-btn active" data-preset="E.PIANO">E.PIANO</button>
          <button class="preset-btn" data-preset="BRASS">BRASS</button>
          <button class="preset-btn" data-preset="STRINGS">STRINGS</button>
          <button class="preset-btn" data-preset="BASS">BASS</button>
          <button class="preset-btn" data-preset="BELL">BELL</button>
          <button class="preset-btn" data-preset="MARIMBA">MARIMBA</button>
          <button class="preset-btn" data-preset="LEAD">LEAD</button>
          <button class="preset-btn" data-preset="ORGAN">ORGAN</button>
        </div>
        <div class="led-bar">
          <div class="led" id="led-power" data-active="true"></div>
          <span class="led-label">PWR</span>
          <div class="led" id="led-audio"></div>
          <span class="led-label">AUDIO</span>
        </div>
      </div>
    </header>

    <main>

      <!-- Keyboard (first view) -->
      <section id="keyboard-section">
        <div id="keyboard" class="keyboard">
          <!-- Generated by JS -->
        </div>
        <div id="keyboard-footer">
          <div id="keyboard-controls">
            <button class="ctrl-btn" id="octave-down">OCT −</button>
            <span id="octave-display">OCT 4</span>
            <button class="ctrl-btn" id="octave-up">OCT +</button>
            <span id="note-display">---</span>
          </div>
          <div class="pitch-control">
            <label>PITCH BEND</label>
            <input type="range" id="pitchbend" min="-2" max="2" step="0.01" value="0">
          </div>
          <span class="key-hint">A S D F G H J K / W E T Y U O P</span>
        </div>
      </section>

      <!-- Parameters (below fold) -->
      <div id="params-area">

        <!-- Operator Panel -->
        <section class="panel" id="operator-panel">
          <div class="panel-label">FM OPERATORS</div>
          <div class="operators-row">
            <div class="operator-block">
              <div class="op-label">CARRIER (OP1)</div>
              <div class="knob-row">
                <div class="knob-group">
                  <div class="knob" id="knob-attack" data-param="attack" data-min="0.001" data-max="2" data-default="0.005">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">ATTACK</div>
                </div>
                <div class="knob-group">
                  <div class="knob" id="knob-decay" data-param="decay" data-min="0.01" data-max="3" data-default="0.4">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">DECAY</div>
                </div>
                <div class="knob-group">
                  <div class="knob" id="knob-sustain" data-param="sustain" data-min="0" data-max="1" data-default="0.15">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">SUSTAIN</div>
                </div>
                <div class="knob-group">
                  <div class="knob" id="knob-release" data-param="release" data-min="0.01" data-max="5" data-default="0.8">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">RELEASE</div>
                </div>
              </div>
            </div>

            <div class="op-arrow">→<br><span>FM</span></div>

            <div class="operator-block">
              <div class="op-label">MODULATOR (OP2)</div>
              <div class="knob-row">
                <div class="knob-group">
                  <div class="knob" id="knob-modRatio" data-param="modRatio" data-min="0.5" data-max="16" data-default="14">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">RATIO</div>
                </div>
                <div class="knob-group">
                  <div class="knob" id="knob-modIndex" data-param="modIndex" data-min="0" data-max="10" data-default="1.2">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">INDEX</div>
                </div>
                <div class="knob-group">
                  <div class="knob" id="knob-modDecay" data-param="modDecay" data-min="0.01" data-max="3" data-default="0.3">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">ENV DEC</div>
                </div>
                <div class="knob-group">
                  <div class="knob" id="knob-feedback" data-param="feedback" data-min="0" data-max="0.5" data-default="0">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">FEEDBACK</div>
                </div>
              </div>
            </div>

            <!-- Effects inline -->
            <div class="operator-block" id="effects-block">
              <div class="op-label">EFFECTS / OUTPUT</div>
              <div class="knob-row">
                <div class="knob-group">
                  <div class="knob" id="knob-filter" data-param="filter" data-min="200" data-max="18000" data-default="8000">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">FILTER</div>
                </div>
                <div class="knob-group">
                  <div class="knob" id="knob-chorus" data-param="chorus" data-min="0" data-max="1" data-default="0.4">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">CHORUS</div>
                </div>
                <div class="knob-group">
                  <div class="knob" id="knob-reverb" data-param="reverb" data-min="0" data-max="1" data-default="0.25">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">REVERB</div>
                </div>
                <div class="knob-group">
                  <div class="knob" id="knob-volume" data-param="volume" data-min="0" data-max="1" data-default="0.7">
                    <div class="knob-inner"></div><div class="knob-dot"></div>
                  </div>
                  <div class="knob-label">VOLUME</div>
                </div>
              </div>
            </div>
          </div>
        </section>

      </div><!-- /params-area -->
    </main>

    <!-- Start overlay -->
    <div id="start-overlay">
      <div class="start-box">
        <div class="start-logo">FM<span>-80</span></div>
        <div class="start-sub">DIGITAL SYNTHESIZER</div>
        <button id="start-btn">POWER ON</button>
      </div>
    </div>
  </div>

  <script src="synth.js"></script>
  <script src="ui.js"></script>
</body>
</html>
