<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FM-80 Synthesizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Swipe handle (right edge) -->
<div id="fx-swipe-handle"></div>

<!-- Right Drawer: Volume (top) + SEQ FX (bottom) -->
<div id="fx-backdrop"></div>
<div id="fx-drawer">
  <div class="fx-section-title">VOLUME</div>
  <div class="fx-slider-row">
    <div class="fx-slider-wrap">
      <input type="range" id="vol-synth" class="fx-slider" min="0" max="1" step="0.01" value="0.6">
      <div class="fx-slider-label">SYNTH</div>
    </div>
    <div class="fx-slider-wrap">
      <input type="range" id="vol-seq1" class="fx-slider" min="0" max="1" step="0.01" value="0.55">
      <div class="fx-slider-label">SEQ1</div>
    </div>
    <div class="fx-slider-wrap">
      <input type="range" id="vol-seq2" class="fx-slider" min="0" max="1" step="0.01" value="0.55">
      <div class="fx-slider-label">SEQ2</div>
    </div>
    <div class="fx-slider-wrap">
      <input type="range" id="vol-chord" class="fx-slider" min="0" max="1" step="0.01" value="0.5">
      <div class="fx-slider-label">CHORD</div>
    </div>
    <div class="fx-slider-wrap">
      <input type="range" id="vol-drum" class="fx-slider" min="0" max="1" step="0.01" value="0.7">
      <div class="fx-slider-label">DRUM</div>
    </div>
  </div>
  <div class="fx-section-divider"></div>
  <div class="fx-section-title fx-title-pink">SEQ FX</div>
  <div class="fx-slider-row">
    <div class="fx-slider-wrap">
      <input type="range" id="fx-dist"  class="fx-slider" min="0" max="1"    step="0.01" value="0">
      <div class="fx-slider-label">DIST</div>
    </div>
    <div class="fx-slider-wrap">
      <input type="range" id="fx-comp"  class="fx-slider" min="0" max="1"    step="0.01" value="0">
      <div class="fx-slider-label">COMP</div>
    </div>
    <div class="fx-slider-wrap">
      <input type="range" id="fx-delay" class="fx-slider" min="0" max="1"    step="0.01" value="0">
      <div class="fx-slider-label">DELAY</div>
    </div>
    <div class="fx-slider-wrap">
      <input type="range" id="fx-reverb" class="fx-slider" min="0" max="1"   step="0.01" value="0.06">
      <div class="fx-slider-label">REVERB</div>
    </div>
  </div>
  <div class="fx-section-divider"></div>
  <div class="fx-section-title fx-title-export">EXPORT</div>
  <div class="rec-controls">
    <button id="rec-toggle-btn" class="rec-btn">⏺ REC</button>
    <div id="rec-status" class="rec-status">—</div>
    <button id="rec-download-btn" class="rec-dl-btn" style="display:none">⬇ WAV</button>
  </div>
  <div class="fx-drawer-hint">スワイプで閉じる →</div>
</div>

<div id="app">

  <!-- ① Header -->
  <header>
    <div class="brand-col">
      <div class="brand">
        <span class="brand-logo">◈</span>
        <span class="brand-name">FM<span class="brand-dash">-</span>80</span>
      </div>
      <div class="led-bar">
        <div class="led" id="led-power"></div>
        <div class="led" id="led-audio"></div>
      </div>
    </div>
    <button id="fx-open-btn" title="VOL / FX  [\]">⚙</button>
    <div class="preset-grid">
      <button class="preset-btn active" data-preset="E.PIANO">E.PIANO</button>
      <button class="preset-btn" data-preset="BRASS">BRASS</button>
      <button class="preset-btn" data-preset="STRINGS">STRINGS</button>
      <button class="preset-btn" data-preset="BASS">BASS</button>
      <button class="preset-btn" data-preset="BELL">BELL</button>
      <button class="preset-btn" data-preset="MARIMBA">MARIMBA</button>
      <button class="preset-btn" data-preset="LEAD">LEAD</button>
      <button class="preset-btn" data-preset="ORGAN">ORGAN</button>
    </div>
  </header>

  <!-- ② Parameters (all in one compact panel) -->
  <section id="params-panel">

    <div class="param-row">

      <div class="param-section">
        <div class="param-section-label">ENV</div>
        <div class="param-section-knobs">
          <div class="knob-group">
            <div class="knob" data-param="attack"  data-min="0.001" data-max="2"   data-default="0.005"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">ATK</div>
          </div>
          <div class="knob-group">
            <div class="knob" data-param="decay"   data-min="0.01"  data-max="3"   data-default="0.5"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">DCY</div>
          </div>
          <div class="knob-group">
            <div class="knob" data-param="sustain" data-min="0"     data-max="1"   data-default="0.1"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">SUS</div>
          </div>
          <div class="knob-group">
            <div class="knob" data-param="release" data-min="0.01"  data-max="5"   data-default="0.8"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">REL</div>
          </div>
        </div>
      </div>

      <div class="param-divider"></div>

      <div class="param-section">
        <div class="param-section-label">FM</div>
        <div class="param-section-knobs">
          <div class="knob-group">
            <div class="knob" data-param="modRatio" data-min="0.5" data-max="16"  data-default="0.5"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">RATIO</div>
          </div>
          <div class="knob-group">
            <div class="knob" data-param="modIndex" data-min="0"   data-max="12"  data-default="5"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">INDEX</div>
          </div>
          <div class="knob-group">
            <div class="knob" data-param="modDecay" data-min="0.01" data-max="3"  data-default="0.4"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">ENV.D</div>
          </div>
        </div>
      </div>

      <div class="param-divider"></div>

      <div class="param-section">
        <div class="param-section-label">EFFECTS</div>
        <div class="param-section-knobs">
          <div class="knob-group">
            <div class="knob" data-param="dist"    data-min="0"    data-max="1"     data-default="0"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">DIST</div>
          </div>
          <div class="knob-group">
            <div class="knob" data-param="delayTime" data-min="0"  data-max="1"     data-default="0"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">DELAY</div>
          </div>
          <div class="knob-group">
            <div class="knob" data-param="delayFb" data-min="0"   data-max="0.92"  data-default="0"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">FB</div>
          </div>
          <div class="knob-group">
            <div class="knob" data-param="reverb"  data-min="0"    data-max="1"     data-default="0.18"><div class="knob-inner"></div><div class="knob-dot"></div></div>
            <div class="knob-label">REVERB</div>
          </div>
        </div>
      </div>

    </div>

  </section>

  <!-- ③ Sequencer -->
  <section id="sequencer-section">
    <div class="seq-header">
      <span class="seq-title">STEP SEQ</span>
      <div class="seq-bpm-ctrl">
        <button class="ctrl-btn" id="bpm-down">−</button>
        <span id="bpm-display">65</span>
        <button class="ctrl-btn" id="bpm-up">+</button>
        <span class="seq-bpm-label">BPM</span>
      </div>
      <button id="seq-step-write-btn">STEP</button>
      <button id="seq-rest-btn" style="display:none">REST →</button>
      <button id="seq-rec-btn" style="display:none">⏺ REC</button>
      <button id="seq-play-btn">▶ PLAY</button>
    </div>
    <div id="seq-steps"></div>
    <div class="seq-pattern-bar" id="seq-pattern-bar">
      <button class="seq-pattern-save-btn" id="seq-pattern-save-btn">SAVE</button>
      <button class="seq-pattern-slot" data-slot="0">P1</button>
      <button class="seq-pattern-slot" data-slot="1">P2</button>
      <button class="seq-pattern-slot" data-slot="2">P3</button>
      <button class="seq-pattern-slot" data-slot="3">P4</button>
      <button class="seq-pattern-slot" data-slot="4">P5</button>
      <button class="seq-pattern-slot" data-slot="5">P6</button>
      <button class="seq-pattern-slot" data-slot="6">P7</button>
      <button class="seq-pattern-slot" data-slot="7">P8</button>
    </div>
  </section>

  <!-- CHORD collapsible -->
  <div id="chord-wrap">
    <button id="chord-toggle-btn">CHORD ▼</button>
    <section id="chord-section">
      <div class="chord-controls-row">
        <div class="chord-type-bar">
          <button class="chord-type-btn active" data-type="maj">MAJ</button>
          <button class="chord-type-btn" data-type="min">MIN</button>
          <button class="chord-type-btn" data-type="7">7th</button>
          <button class="chord-type-btn" data-type="m7">m7</button>
          <button class="chord-type-btn" data-type="maj7">M7</button>
          <button class="chord-type-btn" data-type="dim">DIM</button>
          <button class="chord-type-btn" data-type="sus4">SUS</button>
        </div>
        <div class="chord-oct-ctrl">
          <button class="ctrl-btn" id="chord-oct-down">−</button>
          <span id="chord-oct-display">OCT 4</span>
          <button class="ctrl-btn" id="chord-oct-up">+</button>
        </div>
      </div>
      <div id="chord-palette">
        <button class="chord-root-btn" data-semitone="0">C</button>
        <button class="chord-root-btn black" data-semitone="1">C#</button>
        <button class="chord-root-btn" data-semitone="2">D</button>
        <button class="chord-root-btn black" data-semitone="3">Eb</button>
        <button class="chord-root-btn" data-semitone="4">E</button>
        <button class="chord-root-btn" data-semitone="5">F</button>
        <button class="chord-root-btn black" data-semitone="6">F#</button>
        <button class="chord-root-btn" data-semitone="7">G</button>
        <button class="chord-root-btn black" data-semitone="8">Ab</button>
        <button class="chord-root-btn" data-semitone="9">A</button>
        <button class="chord-root-btn black" data-semitone="10">Bb</button>
        <button class="chord-root-btn" data-semitone="11">B</button>
      </div>
      <div class="seq-header">
        <span class="seq-title">CHORD SEQ</span>
        <button id="chord-step-write-btn">STEP</button>
        <button id="chord-rest-btn" style="display:none">REST →</button>
        <button id="chord-play-btn">▶ PLAY</button>
      </div>
      <div id="chord-steps"></div>
      <div class="seq-pattern-bar" id="chord-pattern-bar">
        <button class="seq-pattern-save-btn" id="chord-pattern-save-btn">SAVE</button>
        <button class="seq-pattern-slot" data-slot="0">P1</button>
        <button class="seq-pattern-slot" data-slot="1">P2</button>
        <button class="seq-pattern-slot" data-slot="2">P3</button>
        <button class="seq-pattern-slot" data-slot="3">P4</button>
        <button class="seq-pattern-slot" data-slot="4">P5</button>
        <button class="seq-pattern-slot" data-slot="5">P6</button>
        <button class="seq-pattern-slot" data-slot="6">P7</button>
        <button class="seq-pattern-slot" data-slot="7">P8</button>
      </div>
    </section>
  </div>

  <!-- SEQ 2 collapsible -->
  <div id="seq2-wrap">
    <button id="seq2-toggle-btn">SEQ 2 ▼</button>
    <section id="seq2-section">
      <div class="seq-header">
        <span class="seq-title">STEP SEQ 2</span>
        <div class="seq-bpm-ctrl">
          <button class="ctrl-btn" id="bpm2-down">−</button>
          <span id="bpm2-display">65</span>
          <button class="ctrl-btn" id="bpm2-up">+</button>
          <span class="seq-bpm-label">BPM</span>
        </div>
        <button id="seq2-step-write-btn">STEP</button>
        <button id="seq2-rest-btn" style="display:none">REST →</button>
        <button id="seq2-rec-btn" style="display:none">⏺ REC</button>
        <button id="seq2-play-btn">▶ PLAY</button>
      </div>
      <div id="seq2-steps"></div>
      <div class="seq-pattern-bar" id="seq2-pattern-bar">
        <button class="seq-pattern-save-btn" id="seq2-pattern-save-btn">SAVE</button>
        <button class="seq-pattern-slot" data-slot="0">P1</button>
        <button class="seq-pattern-slot" data-slot="1">P2</button>
        <button class="seq-pattern-slot" data-slot="2">P3</button>
        <button class="seq-pattern-slot" data-slot="3">P4</button>
        <button class="seq-pattern-slot" data-slot="4">P5</button>
        <button class="seq-pattern-slot" data-slot="5">P6</button>
        <button class="seq-pattern-slot" data-slot="6">P7</button>
        <button class="seq-pattern-slot" data-slot="7">P8</button>
      </div>
    </section>
  </div>

  <!-- ⑤ Melody Recorder Track -->
  <section id="melody-section">
    <div class="melody-header">
      MELODY
      <span id="melody-timbre" class="melody-timbre-tag">E.PIANO</span>
      <button id="melody-onoff-btn" class="drum-toggle">OFF</button>
      <button id="melody-rec-btn" class="melody-rec-btn">⏺ REC</button>
      <button id="melody-play-btn" class="melody-play-btn">▶ PLAY</button>
    </div>
    <div id="melody-steps" class="melody-steps"></div>
    <div class="seq-pattern-bar" id="melody-pattern-bar">
      <button class="seq-pattern-save-btn" id="melody-pattern-save-btn">SAVE</button>
      <button class="melody-pattern-slot" data-slot="0">P1</button>
      <button class="melody-pattern-slot" data-slot="1">P2</button>
      <button class="melody-pattern-slot" data-slot="2">P3</button>
      <button class="melody-pattern-slot" data-slot="3">P4</button>
      <button class="melody-pattern-slot" data-slot="4">P5</button>
      <button class="melody-pattern-slot" data-slot="5">P6</button>
      <button class="melody-pattern-slot" data-slot="6">P7</button>
      <button class="melody-pattern-slot" data-slot="7">P8</button>
    </div>
  </section>

  <!-- ④ Keyboard -->
  <section id="keyboard-section">
    <div id="keyboard-scroll"><div id="keyboard"></div></div>
    <div id="keyboard-footer">
      <button class="ctrl-btn" id="octave-down">−</button>
      <span id="octave-display">OCT 4</span>
      <button class="ctrl-btn" id="octave-up">+</button>
      <span id="note-display">---</span>
      <span class="spacer"></span>
      <label class="pitch-label">BEND</label>
      <input type="range" id="pitchbend" min="-2" max="2" step="0.01" value="0">
    </div>
  </section>

  <!-- ⑤ Drum Track -->
  <section id="drum-section">
    <div class="drum-header">
      DRUMS
      <button id="drum-toggle-btn" class="drum-toggle">OFF</button>
    </div>
    <div id="drum-grid"></div>
  </section>

</div><!-- #app -->

<!-- Start overlay -->
<div id="start-overlay">
  <div class="start-box">
    <div class="start-logo">FM<span>-80</span></div>
    <div class="start-sub">DIGITAL SYNTHESIZER</div>
    <button id="start-btn">POWER ON</button>
  </div>
</div>

<script src="synth.js"></script>
<script src="sequencer.js"></script>
<script src="chord.js"></script>
<script src="drum.js"></script>
<script src="melody.js"></script>
<script src="ui.js"></script>
</body>
</html>
